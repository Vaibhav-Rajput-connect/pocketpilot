name: PocketPilot CI/CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: pocketpilot-backend-prod
  SSM_DOCUMENT_NAME: AWS-RunShellScript

jobs:
  test-and-build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building backend Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile backend/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: test-and-build
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger SSM Deployment Command
        run: |
          echo "Fetching running instances from Auto Scaling Group..."
          EC2_INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=tag:aws:autoscaling:groupName,Values=pocketpilot-asg-prod" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\t' ' ')
            
          if [ -z "$EC2_INSTANCES" ]; then
            echo "No running instances found in the Auto Scaling Group!"
            exit 1
          fi
          
          echo "Filtering instances that are online in SSM..."
          INSTANCE_IDS=""
          for ID in $EC2_INSTANCES; do
            PING_STATUS=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=$ID" --query "InstanceInformationList[0].PingStatus" --output text || echo "Offline")
            if [ "$PING_STATUS" == "Online" ]; then
              INSTANCE_IDS="$INSTANCE_IDS $ID"
            else
              echo "⚠️ Instance $ID is running but not yet online in SSM. Skipping for this deployment."
            fi
          done
          
          INSTANCE_IDS=$(echo $INSTANCE_IDS | xargs)
          
          if [ -z "$INSTANCE_IDS" ]; then
            echo "No SSM-ready instances found to deploy to! Exiting gracefully."
            exit 0
          fi
          
          echo "Found SSM-ready instances: $INSTANCE_IDS"
          echo "Executing CI deployment script via SSM..."
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["for i in {1..12}; do if curl -sSf https://raw.githubusercontent.com/Vaibhav-Rajput-connect/pocketpilot/${{ github.sha }}/aws-infrastructure/scripts/ci-deploy.sh -o /tmp/ci-deploy.sh; then bash /tmp/ci-deploy.sh; exit $?; fi; echo \"Retrying curl ($i/12)...\"; sleep 10; done; exit 1"]}' \
            --comment "Deploying commit ${{ github.sha }}" \
            --query "Command.CommandId" \
            --output text)
            
          echo "Command ID: $COMMAND_ID"
          echo "Waiting for command to complete on all instances..."
          
          # Wait for SSM command to finish and print outputs
          EXIT_CODE=0
          for ID in $INSTANCE_IDS; do
            echo "Waiting for instance $ID..."
            STATUS="InProgress"
            while [[ "$STATUS" == "InProgress" || "$STATUS" == "Pending" || "$STATUS" == "Delayed" ]]; do
              sleep 10
              STATUS=$(aws ssm list-command-invocations --command-id "$COMMAND_ID" --instance-id "$ID" --query "CommandInvocations[0].Status" --output text)
            done
            
            if [ "$STATUS" != "Success" ]; then
              STATE=$(aws ec2 describe-instances --instance-ids "$ID" --query "Reservations[0].Instances[0].State.Name" --output text || echo "unknown")
              if [ "$STATE" != "running" ]; then
                echo "⚠️ Instance $ID is no longer running (state: $STATE). Ignoring failure as it was likely terminated by ASG."
              else
                echo "❌ Command failed with status $STATUS on instance $ID"
                EXIT_CODE=1
              fi
            fi
            
            echo "=========================================="
            echo "Logs for instance $ID:"
            echo "=========================================="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID" \
              --query "StandardOutputContent" \
              --output text
              
            echo "-----------------------------Errors-------"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID" \
              --query "StandardErrorContent" \
              --output text
            echo "=========================================="
          done

          if [ $EXIT_CODE -ne 0 ]; then
            exit 1
          fi

          echo "✅ Deployment successful on all instances!"
