services:
  - type: web
    name: pocketpilot-backend
    env: docker
    region: ohio
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PORT
        value: "10000"
    dockerCommand: "bash start.sh"
