services:
  - type: web
    name: pocketpilot-backend
    env: docker
    region: ohio
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: PORT
        value: "10000"
    dockerCommand: 'sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"'
